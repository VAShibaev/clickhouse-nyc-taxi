services:
  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server
    ports:
      - "9000:9000"
      - "8123:8123"
    deploy:
      resources:
        limits:
          memory: 8G
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse/
      - clickhouse-logs:/var/log/clickhouse-server/


volumes:
  clickhouse-data:
  clickhouse-logs: